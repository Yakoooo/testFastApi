services:
  api:
    build:
      context: .
    container_name: testfastapi-api
    ports:
      - "8000:8000"
    environment:
      APP_NAME: testFastApi
      DEBUG: "false"
      DATABASE_URL: "postgresql+psycopg://testfastapi:testfastapi@postgres:5432/testfastapi"
      TEST_DATABASE_URL: "sqlite+pysqlite:///:memory:"
      SECRET_KEY: change-me-to-a-long-random-secret
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      CORS_ORIGINS: '[]'
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      fastapi run app/main.py --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: testfastapi-postgres
    environment:
      POSTGRES_DB: testfastapi
      POSTGRES_USER: testfastapi
      POSTGRES_PASSWORD: testfastapi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testfastapi -d testfastapi"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
